name: auto-docs

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip auto-docs]') && !startsWith(github.event.head_commit.message, 'chore(docs): auto-sync')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run auto-docs
        run: python3 tools/auto-docs/run_all.py
      - name: Commit + push if diff
        run: |
          if [[ -z "$(git status --porcelain CHANGELOG.md README.md docs/SKILLS.md examples/README.md 2>/dev/null)" ]]; then
            echo "auto-docs: no diff"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md README.md docs/SKILLS.md examples/README.md 2>/dev/null || true
          HEAD_SHA="$(git rev-parse --short HEAD)"
          git commit -m "chore(docs): auto-sync after ${HEAD_SHA} [skip ci]"
          git push
